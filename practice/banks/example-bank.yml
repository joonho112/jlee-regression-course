# example-bank.yml — BER 640 student quiz bank (canonical schema v1.0 demo).
# Contains exactly ONE item of each of the 6 types, using REAL content drawn from
# the instructor quizzes (quiz1-simple-regression, quiz5-interactions,
# quiz8-multiple-logistic-simpsons) and the style guide. Validates against
# ../schema/quiz-schema.json. This is the gold reference an author copies from.

schema_version: "1.0"
quiz_id: example
title: "Example Bank — One Item of Each Type"
module: "Schema demonstration (Ch. 1, 5, 8)"
available_after: "Reference only"

# Quiz-level "home" link into the Lecture Notes (the chapter landing).
source:
  chapter: 1
  title: "Simple Linear Regression"
  section: "The Simple Linear Regression Model"
  href: "../../notes/chapters/01-simple-linear-regression.html#sec-ch1-model"

mastery:
  full_min: 80
  partial_min: 60

settings:
  time_limit_min: 60
  attempts: "unlimited"
  score_recorded: "highest"
  show_answers: "immediately"

# Chapter-level data table several items reference, stored once and pulled in
# per item via `asset_refs`.
shared_assets:
  - id: langton-salary-table
    kind: table
    title: "Selected coefficients from Langton (1994), Table 3"
    caption: >-
      Unstandardized OLS coefficients predicting 9-month faculty salary. **Sex is
      coded $1 =$ female, $0 =$ male** (men are the reference). Model 2 adds salary
      variation and a Sex $\times$ salary-variation interaction.
    markdown: |
      | Variable | Model 1 | Model 2 |
      |:---------|--------:|--------:|
      | Years of experience | 162.68 (2.05) | 162.59 (2.05) |
      | Degree quality (0–4 scale) | 616.77 (34.48) | 657.08 (34.64) |
      | Sex (female = 1) | −1863.70 (62.07) | −698.46 (566.87) |
      | Salary variation | — | −5571.50 (585.62) |
      | Sex × salary variation | — | −3932.71 (1872.05) |
      | Intercept | 10033.24 | 11712.80 |
      | $R^2$ (adjusted) | .40 | .40 |

items:

  # ===========================================================================
  # 1. multiple_choice — Quiz 1, Q2 (slope interpretation)
  # ===========================================================================
  - id: ex-mc-slope
    type: multiple_choice
    number: 1
    topic: "Slope interpretation"
    points: 1
    difficulty: applied
    stem: |
      For students at a college, the prediction equation relating college GPA
      ($y$) to high school GPA ($x$), both on a 0–4 scale, is

      $$\hat{y} = 0.5 + 0.7\,x.$$

      Which statement correctly interprets the **slope**?
    options:
      - id: a
        text: "A student with a high school GPA of 1 is predicted to have a college GPA of 0.7."
        correct: false
        rationale: >-
          Confuses the slope with a fitted value. At $x = 1$,
          $\hat{y} = 0.5 + 0.7(1) = 1.2$, not 0.7; the slope is a *rate of change*,
          not a predicted score.
      - id: b
        text: "For each 1-point increase in high school GPA, the predicted college GPA is higher by 0.7 points, on average."
        correct: true
      - id: c
        text: "Raising a student's high school GPA by 1 point causes their college GPA to rise by 0.7 points."
        correct: false
        rationale: >-
          Imposes a causal claim. The slope describes association, not causation;
          with observational data, unmeasured factors could drive both GPAs, so
          "causes" is unjustified.
      - id: d
        text: "For each 1-point increase in high school GPA, the predicted college GPA is higher by 0.7 standard deviations, on average."
        correct: false
        rationale: >-
          The 0.7 is in raw GPA *points* per GPA point, not standard deviations.
          The "per standard deviation" reading belongs to the *standardized*
          coefficient, a different quantity.
    why_correct: >-
      The slope is the predicted change in the response per one-unit increase in
      the predictor: a 1-point rise in high school GPA is associated with a
      **0.7-point increase** in *predicted* college GPA, on average — naming the
      variable, direction, magnitude, and units.
    source:
      chapter: 1
      title: "Simple Linear Regression"
      section: "Interpreting the Intercept and Slope"
      href: "../../notes/chapters/01-simple-linear-regression.html#sec-ch1-model"

  # ===========================================================================
  # 2. true_false — Quiz 1, Q8 (extrapolation reliability)
  # ===========================================================================
  - id: ex-tf-extrapolation
    type: true_false
    number: 2
    topic: "Extrapolation reliability"
    points: 1
    difficulty: conceptual
    shuffle: false
    stem: |
      **True or False:** As long as the arithmetic is done correctly, a fitted
      regression equation gives a *trustworthy* prediction for any value of $x$ —
      including values well outside the range of the data used to fit it.
    options:
      - id: t
        text: "True"
        correct: false
        rationale: >-
          Conflates a *valid substitution* with a *valid value*. The equation
          always returns a number for any $x$, but that number is only dependable
          within the observed range; trusting any arithmetically correct
          prediction is the targeted misconception.
      - id: f
        text: "False"
        correct: true
    why_correct: >-
      A correct substitution is not the same as a reliable prediction. The fitted
      line is supported only over the **range of $x$ in the data**; predicting
      outside it is **extrapolation**, where the linear relationship may no longer
      hold, so the value can be untrustworthy — or even impossible (a GPA above 4)
      — even though the arithmetic is exact.
    source:
      chapter: 1
      title: "Simple Linear Regression"
      section: "Extrapolation"
      href: "../../notes/chapters/01-simple-linear-regression.html#extrapolation"

  # ===========================================================================
  # 3. multiple_answer — style-guide canonical example (OLS residual properties)
  # ===========================================================================
  - id: ex-ma-ols-residuals
    type: multiple_answer
    number: 3
    topic: "Properties of OLS residuals"
    points: 2
    difficulty: conceptual
    stem: |
      In a simple linear regression fit by ordinary least squares, which of the
      following are *always* true? **Select all that apply.**
    options:
      - id: a
        text: "The residuals sum to zero."
        correct: true
      - id: b
        text: "The residuals are uncorrelated with the predictor."
        correct: true
      - id: c
        text: "The sum of squared residuals is minimized."
        correct: true
      - id: d
        text: "The residuals are always normally distributed."
        correct: false
        rationale: >-
          Normality is a modeling *assumption* about the errors used for
          inference, not a guaranteed property of the residuals.
      - id: e
        text: "The fitted line passes through $(\\bar{x}, \\bar{y})$."
        correct: true
    why_correct: >-
      Options A, B, C, and E are algebraic consequences of the OLS normal
      equations and hold for *every* fitted line; only D is a distractor, because
      normality is an inference assumption about the errors, not a property the
      residuals must satisfy.
    source:
      chapter: 1
      title: "Simple Linear Regression"
      section: "Least-squares properties"
      href: "../../notes/chapters/01-simple-linear-regression.html#sec-ch1-ols"

  # ===========================================================================
  # 4. numeric — Quiz 1, Q6 (compute a fitted value); exercises BOTH tolerance
  #    and accept_range, plus documented wrong-method values.
  # ===========================================================================
  - id: ex-num-fitted-value
    type: numeric
    number: 4
    topic: "Computing a fitted value"
    points: 2
    difficulty: applied
    stem: |
      For students at a college, the prediction equation relating college GPA
      ($y$) to high school GPA ($x$) is

      $$\hat{y} = 0.5 + 0.7\,x.$$

      For a student with a **high school GPA of 3.0**, the predicted college GPA
      $\hat{y}$ is ________. Enter a number.
    answer: 2.6
    tolerance: 0.05
    accept_range: { min: 2.55, max: 2.65 }
    unit: "GPA points"
    placeholder: "Enter a number"
    distractor_notes:
      - value: 2.1
        rationale: "Uses only the slope term $0.7 \\times 3.0$ and drops the intercept."
      - value: 3.6
        rationale: "Computes $(0.5 + 0.7) \\times 3.0$ — the wrong order of operations."
      - value: 0.5
        rationale: "Reports the intercept alone."
    why_correct: >-
      $\hat{y} = 0.5 + 0.7(3.0) = 0.5 + 2.1 = 2.6$ GPA points. The narrow
      $\pm 0.05$ window absorbs sensible rounding but excludes the common wrong
      methods (2.1, 3.6, 0.5).
    source:
      chapter: 1
      title: "Simple Linear Regression"
      section: "OLS Estimation"
      href: "../../notes/chapters/01-simple-linear-regression.html#sec-ch1-ols"

  # ===========================================================================
  # 5. multi_blank — Quiz 5, Q9 (salary gap as a function of salary variation).
  #    Two numeric blanks + one accept-list text blank. {{blankN}} tokens live in
  #    the PROSE bullets (never inside $$...$$), so the engine can place inputs
  #    without breaking the rendered equation.
  # ===========================================================================
  - id: ex-mb-gap-function
    type: multi_blank
    number: 5
    topic: "Gap as a function of salary variation"
    points: 2
    difficulty: applied
    partial_credit: true
    asset_refs: [langton-salary-table]
    stem: |
      In **Model 2** (Sex coded $1 =$ female, $0 =$ male), the *Sex* coefficient is
      $-698.46$ and the *Sex × salary variation* coefficient is $-3932.71$. The
      estimated **male − female** salary gap is a linear function of salary
      variation (SV):

      $$\text{(male)} - \text{(female)} = b_0 + b_1 \times \text{SV}.$$

      - The intercept of the gap (male − female at SV $= 0$) is $b_0 =$ {{blank1}}.
      - The slope of the gap on SV is $b_1 =$ {{blank2}}.
      - As salary variation increases, the male − female gap {{blank3}} (widens / narrows).
    blanks:
      - id: blank1
        kind: numeric
        label: "gap intercept (male − female at SV = 0)"
        answer: 698.46
        accept_range: { min: 690, max: 707 }
        rationale: >-
          The *Sex* coefficient is the *female − male* gap at SV $= 0$ ($-698.46$);
          reversed to *male − female* it flips sign to **+698.46**.
      - id: blank2
        kind: numeric
        label: "gap slope on SV"
        answer: 3932.71
        accept_range: { min: 3900, max: 3965 }
        rationale: >-
          The interaction coefficient is $-3932.71$ on the female−male scale;
          reversed to male−female it is **+3932.71**, the rate at which the male
          advantage grows per one-unit increase in salary variation.
      - id: blank3
        kind: text
        label: "direction of the gap as SV rises"
        accept: ["widens", "widen", "increases", "grows"]
        match: ci_trim
        rationale: >-
          Because the slope on SV is **positive** ($+3932.71$), the male − female
          gap *increases* as salary variation rises. Answering "narrows" mistakes
          the sign of the slope.
    why_correct: >-
      Reversing the published *female − male* coefficients to the *male − female*
      scale flips both signs: the gap is $698.46 + 3932.71 \times \text{SV}$.
      Because that slope is positive, the gap **widens** as salary variation grows.
    source:
      chapter: 5
      title: "Interactions"
      section: "The School Difference Depends on LRT"
      href: "../../notes/chapters/05-interactions.html#the-school-difference-depends-on-lrt"

  # ===========================================================================
  # 6. matching — Quiz 5, Q12 (residuals-vs-fitted patterns). 3 prompts, 4
  #    responses; response `z` is an unused distractor.
  # ===========================================================================
  - id: ex-match-resid-fitted
    type: matching
    number: 6
    topic: "Reading a residuals-vs-fitted plot"
    points: 2
    difficulty: applied
    partial_credit: true
    stem: |
      After fitting the faculty-salary model, you examine the
      **residuals-vs-fitted** plot. Match each described *pattern* (left) to the
      *diagnosis* it most clearly signals (right). Each diagnosis is used at most
      once; one right-column option is a distractor.
    prompts:
      - id: p1
        text: "Points scatter randomly in a horizontal band of roughly constant width; the LOESS curve is flat at zero."
        match: x
        rationale: >-
          Random scatter in a constant-width band with a flat LOESS shows neither a
          mean nor a spread problem — linearity and constant variance look satisfied.
      - id: p2
        text: "The spread *fans out* — a narrow band at low fitted values widening to a wide band at high fitted values (a funnel); the LOESS curve stays flat."
        match: w
        rationale: >-
          A funnel/fan in the spread is the signature of non-constant variance: OLS
          coefficients stay unbiased, but the usual SEs, $t$-tests, $p$-values, and
          CIs become unreliable.
      - id: p3
        text: "The LOESS curve through the residuals is clearly *U-shaped* (curved) while the vertical spread stays roughly constant."
        match: y
        rationale: >-
          A curved (U-shaped) LOESS signals a mis-specified **mean** structure (a
          missing nonlinear term); the constant spread confirms the problem is the
          mean, not the variance.
    responses:
      - id: w
        text: "Heteroscedasticity: coefficients stay unbiased, but the usual SEs, CIs, and $p$-values become unreliable."
      - id: x
        text: "Assumptions look satisfied: constant spread and a flat mean indicate no clear violation of linearity or constant variance."
      - id: y
        text: "Nonlinearity: the mean structure is mis-specified (a needed nonlinear term is missing)."
      - id: z
        text: "Non-normality of the residuals (best diagnosed from the Q–Q plot, not this plot)."
        distractor: true
        rationale: >-
          Non-normality is read from the **Q–Q plot**, not from curvature or
          funneling in the residuals-vs-fitted plot, so no pattern here maps to it.
    why_correct: >-
      The correct pairing is p1 → X, p2 → W, p3 → Y, with Z unused. A flat LOESS
      over a constant-width band means assumptions look satisfied (X); a funnel in
      the spread is heteroscedasticity (W); a U-shaped LOESS over constant spread is
      nonlinearity in the mean (Y). Non-normality (Z) belongs to the Q–Q plot.
    source:
      chapter: 8
      title: "Model Diagnostics"
      section: "Residuals vs. Fitted Values Plot"
      href: "../../notes/chapters/08-model-diagnostics.html#sec-ch8-resid-fitted"
