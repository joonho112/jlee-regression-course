<svg xmlns="http://www.w3.org/2000/svg" viewBox="-40 0 600 600" preserveAspectRatio="xMidYMid meet" role="img" aria-label="BER 640 regression hex glyph">
  <title>BER 640 — regression hex glyph</title>

  <defs>
    <clipPath id="hexClipG">
      <path d="M260 30 L493.82 165 L493.82 435 L260 570 L26.18 435 L26.18 165 Z"/>
    </clipPath>
    <linearGradient id="bodyGradG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0B3D66"/>
      <stop offset="1" stop-color="#1A2A3A"/>
    </linearGradient>
  </defs>

  <!-- soft drop shadow -->
  <path d="M260 42 L493.82 177 L493.82 447 L260 582 L26.18 447 L26.18 177 Z"
