    <g fill="#FBFAF7" stroke="#1A2A3A" stroke-width="2.5">
      <circle cx="152" cy="320" r="13"/>
      <circle cx="200" cy="250" r="13"/>
      <circle cx="250" cy="255" r="13"/>
      <circle cx="300" cy="192" r="13"/>
      <circle cx="350" cy="193" r="13"/>
      <circle cx="392" cy="140" r="13"/>
