project:
  type: website
  render:
    - "*.qmd"
  resources:
    - "files/"

execute:
  freeze: auto

website:
  title: "Advanced Statistical Methods in Education"
  description: "BER 640 - A regression approach with R for graduate students in education"
  site-url: "https://joonho112.github.io/jlee-regression-course"

  image: "/files/img/og-card.png"
  open-graph: true
  twitter-card: true

  favicon: "/files/img/favicon-512.png"

  search: true
  page-navigation: true
  repo-url: "https://github.com/joonho112/jlee-regression-course"
  repo-subdir: website
  repo-actions: [edit, issue]

  navbar:
    pinned: true
    background: "#1A2A3A"   # $ink (Cividis Ink) — matches custom.scss token
    logo: "files/img/favicon-192.png"
    logo-alt: "BER 640 regression hex logo"
    title: "BER 640"        # short navbar brand; website:title keeps the full SEO/OG title
    left:
      - text: "{{< fa house >}}"
        file: index.qmd
    right:
      - text: "Materials"
        menu:
          - text: "{{< fa book-open >}} Lecture Notes"
            href: "/notes/"
          - text: "{{< fa laptop-code >}} Lab Manual"
            href: "/labs/"
          - text: "{{< fa circle-question >}} Practice Quizzes"
            href: "/practice/"
          - text: "{{< fa clipboard-list >}} Project Guide"
            href: "/project/"
          - text: "{{< fa database >}} Datasets"
            href: "/regdatasets/"
      - text: "Syllabus"
        file: syllabus.qmd
      - text: "Schedule"
        file: schedule.qmd
      - text: "Content"
        file: content/index.qmd
      - text: "Assignments"
        file: assignment/index.qmd
      - text: "Resources"
        file: resource/index.qmd

  sidebar:
    - title: "Content"
      style: "docked"
      search: true
      background: dark
      collapse-level: 3
      contents:
        - section: "Overview"
          contents:
            - content/index.qmd
        - section: "Sessions"
          contents:
            - text: "1 · Orientation & R Setup"
              file: content/01-content.qmd
            - text: "2 · Simple Linear Regression"
              file: content/02-content.qmd
            - text: "3 · Dummies & the t-Test"
              file: content/03-content.qmd
            - text: "4 · ANCOVA & Statistical Control"
              file: content/04-content.qmd
            - text: "5 · One-Way ANOVA"
              file: content/05-content.qmd
            - text: "6 · Continuous Predictors"
              file: content/06-content.qmd
            - text: "7 · Interactions & Simple Slopes"
              file: content/07-content.qmd
            - text: "8 · Two-Way ANOVA"
              file: content/08-content.qmd
            - text: "9 · Nonlinear Relationships"
              file: content/09-content.qmd
            - text: "10 · Model Building & Diagnostics"
              file: content/10-content.qmd
            - text: "11 · Simple Logistic Regression"
              file: content/11-content.qmd
            - text: "12 · Multiple Logistic Regression"
              file: content/12-content.qmd
            - text: "13 · Logistic Diagnostics & Simpson's Paradox"
              file: content/13-content.qmd
            - text: "14 · GLM Framework & Ordinal Models"
              file: content/14-content.qmd
            - text: "15 · Course Synthesis"
              file: content/15-content.qmd

    - title: "Assignments"
      style: "docked"
      search: false
      background: dark
      collapse-level: 3
      contents:
        - section: "Overview"
          contents:
            - assignment/index.qmd
        - section: "Homework"
          contents:
            - assignment/hw01.qmd
            - assignment/hw02.qmd
            - assignment/hw03.qmd
            - assignment/hw04.qmd
            - assignment/hw05.qmd
            - assignment/hw06.qmd
            - assignment/hw07.qmd
            - assignment/hw08.qmd
        - section: "Project 1: Linear Regression"
          contents:
            - text: "Projects Overview"
              file: assignment/final-project.qmd
            - assignment/project-1-proposal.qmd
            - assignment/project-1-draft.qmd
            - assignment/project-1-final.qmd
        - section: "Project 2: Logistic Regression"
          contents:
            - assignment/project-2-proposal.qmd
            - assignment/project-2-draft.qmd
            - assignment/project-2-final.qmd
        - section: "Quizzes"
          contents:
            - assignment/quizzes.qmd

    - title: "Resources"
      style: "docked"
      search: false
      background: dark
      collapse-level: 3
      contents:
        - section: "Getting Started"
          contents:
            - resource/index.qmd
            - resource/r-setup.qmd
            - resource/stata-to-r.qmd
        - section: "Reference"
          contents:
            - resource/datasets.qmd
            - resource/style-guide.qmd
            - resource/faq.qmd
        - section: "Practice"
          contents:
            - text: "{{< fa circle-question >}} Practice Quizzes (interactive)"
              href: "/practice/"

  page-footer:
    left: |
      Content {{< fa brands creative-commons >}} {{< var course.copyright_year >}} · Developed by {{< var developer.name >}} <br>
      All content licensed under a {{< fa brands creative-commons >}}
      {{< fa brands creative-commons-by >}} {{< fa brands creative-commons-nc >}} {{< fa brands creative-commons-sa >}}
      [Creative Commons Attribution-NonCommercial-ShareAlike 4.0 International license (CC BY-NC-SA 4.0)](https://creativecommons.org/licenses/by-nc-sa/4.0/)
    right: |
      Made with [Quarto](https://quarto.org/)<br>
      [View the source at {{< fa brands github >}} GitHub]({{< var course.github >}})

format:
  html:
    theme:
      - cosmo
      - html/custom.scss
    toc: true
    highlight-style: monokai
    code-copy: true
