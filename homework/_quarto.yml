project:
  type: book
  output-dir: _book

book:
  title: "BER 640 Homework Solutions"
  subtitle: "Complete Solutions with R"
  author: "JoonHo Lee"
  date: "2026"
  date-format: "YYYY"
  site-url: https://joonho112.github.io/jlee-regression-course/homework/
  repo-url: https://github.com/joonho112/jlee-regression-course
  repo-subdir: homework
  repo-actions: [edit, issue]
  search: true
  reader-mode: true

  sidebar:
    style: floating
    collapse-level: 2

  chapters:
    - index.qmd
    - chapters/hw01-simple-regression.qmd
    - chapters/hw02-dummy-regression.qmd
    - chapters/hw03-confounding.qmd
    - chapters/hw04-one-way-anova.qmd
    - chapters/hw05-interactions.qmd
    - chapters/hw06-two-way-anova.qmd
    - chapters/hw07-logistic-interpretation.qmd
    - chapters/hw08-simpsons-paradox.qmd
    - references.qmd

  page-navigation: true
  back-to-top-navigation: true

bibliography: references.bib
csl: apa.csl

format:
  html:
    theme:
      light: cosmo
      dark: darkly
    code-fold: true
    code-tools: true
    code-link: true
    code-line-numbers: true
    highlight-style: github
    toc: true
    toc-depth: 3
    number-sections: true
    fig-width: 8
    fig-height: 5
    fig-dpi: 300
    fig-align: center
    df-print: kable

execute:
  echo: true
  warning: false
  message: false
  freeze: auto

crossref:
  fig-prefix: "Figure"
  tbl-prefix: "Table"
  eq-prefix: "Eq."
  sec-prefix: "Section"
