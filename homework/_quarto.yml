project:
  type: book
  output-dir: _book

book:
  title: "BER 640 Homework Solutions"
  subtitle: "Complete Solutions with R"
  author: "JoonHo Lee"
  date: "2026"
  date-format: "YYYY"
  site-url: https://joonho112.github.io/jlee-regression-course/homework/
  repo-url: https://github.com/joonho112/jlee-regression-course
  repo-subdir: homework
  repo-actions: [edit, issue]
  search: true
  reader-mode: true
  cover-image: images/hex-logo.svg
  cover-image-alt: "BER 640 Homework Solutions hex logo"
  favicon: images/hex-glyph.svg
  page-footer:
    left: "BER 640 · Homework Solutions"
    center: "© 2026 JoonHo Lee · licensed CC BY 4.0"
    right: "Built with [Quarto](https://quarto.org)"

  sidebar:
    style: floating
    collapse-level: 2

  chapters:
    - index.qmd
    # Keep homework filenames stable: these slugs are published URLs and freeze keys.
    # Change display titles in each qmd file; rename files only with redirects.
    - part: "Part I: Linear Regression Foundations"
      chapters:
        - chapters/hw01-simple-regression.qmd
        - chapters/hw02-dummy-regression.qmd
        - chapters/hw03-confounding.qmd
        - chapters/hw04-one-way-anova.qmd
    - part: "Part II: Multiple Regression and Interactions"
      chapters:
        - chapters/hw05-interactions.qmd
        - chapters/hw06-two-way-anova.qmd
    - part: "Part III: Logistic Regression"
      chapters:
        - chapters/hw07-logistic-interpretation.qmd
        - chapters/hw08-simpsons-paradox.qmd
    - references.qmd

  page-navigation: true
  back-to-top-navigation: true

bibliography: references.bib
csl: apa.csl

format:
  html:
    theme:
      light: [cosmo, html/custom.scss]
      dark: [darkly, html/custom-dark.scss]
    lightbox: auto
    code-fold: false
    code-tools: true
    code-link: true
    code-line-numbers: true
    highlight-style: github
    toc: true
    toc-depth: 3
    number-sections: true
    fig-width: 8
    fig-height: 5
    fig-dpi: 300
    fig-align: center
    df-print: kable

execute:
  echo: true
  warning: false
  message: false
  freeze: auto

crossref:
  fig-prefix: "Figure"
  tbl-prefix: "Table"
  eq-prefix: "Eq."
  sec-prefix: "Section"
